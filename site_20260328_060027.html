<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Satyajit Paul Appointment Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #ccc;
        }
        .header h1 {
            margin: 0;
            font-weight: 600;
        }
        .chambers {
            margin-top: 20px;
        }
        .chamber {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
        }
        .chamber:hover {
            background-color: #f0f0f0;
        }
        .chamber selected {
            background-color: #ccc;
        }
        .date-time {
            margin-top: 20px;
        }
        .date-time label {
            display: block;
            margin-bottom: 10px;
        }
        .date-time input[type="date"] {
            width: 100%;
            height: 40px;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        .date-time input[type="time"] {
            width: 100%;
            height: 40px;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        .book-appointment {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .book-appointment:hover {
            background-color: #3e8e41;
        }
        .footer {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
            clear: both;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        @media only screen and (max-width: 768px) {
            .container {
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dr. Satyajit Paul Appointment Booking</h1>
        </div>
        <div class="chambers">
            <h2>Select Chamber:</h2>
            <div class="chamber">
                <input type="radio" id="chamber1" name="chamber" value="Chamber 1">
                <label for="chamber1">Chamber 1</label>
            </div>
            <div class="chamber">
                <input type="radio" id="chamber2" name="chamber" value="Chamber 2">
                <label for="chamber2">Chamber 2</label>
            </div>
            <div class="chamber">
                <input type="radio" id="chamber3" name="chamber" value="Chamber 3">
                <label for="chamber3">Chamber 3</label>
            </div>
        </div>
        <div class="date-time">
            <label for="date">Select Date:</label>
            <input type="date" id="date" name="date">
            <label for="time">Select Time:</label>
            <input type="time" id="time" name="time">
        </div>
        <button class="book-appointment">Book Appointment</button>
    </div>
    <div class="footer">
        Powered by PSP Digital Services
    </div>
    <script>
        const bookAppointmentButton = document.querySelector('.book-appointment');
        bookAppointmentButton.addEventListener('click', () => {
            alert('Appointment booked successfully!');
        });
    </script>
</body>
</html>
